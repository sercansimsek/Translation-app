<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Big+Shoulders:opsz,wght@10..72,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
    <title>Translation App</title>
  </head>
  <body>
    <header class="header">
      <div class="header-container">
        <img src="/assets/parrot.png" alt="parrot image" class="header-img" />
        <div class="header-info">
          <h1 class="header-title">PollyGlot</h1>
          <h4 class="header-subtitle">Perfect Translation Every Time</h4>
        </div>
      </div>
    </header>

    <form class="form">
      <div class="form-container">
        <label class="textarea-heading" for="form-textarea"
          >Text to translate 👇</label
        >
        <textarea
          name="form-textarea"
          id="form-textarea"
          class="form-textarea"
          rows="5"
          cols="25"
          placeholder="How are you?"
        ></textarea>
        <div class="select-heading">Select language 👇</div>
        <div class="form-selections">
          <div>
            <input
              type="radio"
              id="spanish"
              name="form-radio"
              value="Spanish"
            />
            <label for="spanish">Spanish 🇪🇸</label>
          </div>
          <div>
            <input
              type="radio"
              id="turkish"
              name="form-radio"
              value="Turkish"
            />
            <label for="turkish">Turkish 🇹🇷</label>
          </div>
          <div>
            <input type="radio" id="slovak" name="form-radio" value="Slovak" />
            <label for="slovak">Slovak 🇸🇰</label>
          </div>
        </div>
        <button type="submit" class="form-btn">Translate</button>
      </div>
    </form>
    <p class="result"></p>
    <script type="module" src="index.js"></script>
  </body>
</html>
